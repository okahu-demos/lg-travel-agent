[pytest]
filterwarnings =
    # langgraph_supervisor 0.0.31 still calls the deprecated create_react_agent
    # internally (supervisor.py:431). Not fixable in our code; ignore until the
    # library migrates to langchain.agents.create_agent.
    ignore:create_react_agent has been moved:langgraph.warnings.LangGraphDeprecatedSinceV10
